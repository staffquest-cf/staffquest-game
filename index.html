<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>StaffQuest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#071330;font-family:monospace;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0px,rgba(255,255,255,.015) 1px,transparent 1px,transparent 28px),
  repeating-linear-gradient(90deg,rgba(255,255,255,.015) 0px,rgba(255,255,255,.015) 1px,transparent 1px,transparent 28px),#071330;}
.torch{position:fixed;font-size:22px;z-index:0;pointer-events:none;animation:flicker 1.3s ease-in-out infinite alternate;}
#t1{top:16px;left:16px;}
#t2{top:16px;right:16px;}
@keyframes flicker{0%{opacity:.6;transform:scale(1);}100%{opacity:1;transform:scale(1.15);}}
#wrap{position:relative;z-index:1;width:100%;max-width:360px;height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 20px;gap:10px;}
#logo-img{width:85%;max-width:260px;height:auto;display:block;margin:0 auto;}
#logo-sub{font-size:9px;color:#4455aa;letter-spacing:3px;text-transform:uppercase;margin-top:4px;text-align:center;}
#form-card{background:rgba(7,19,48,.85);border:1px solid rgba(245,200,66,.22);border-radius:12px;padding:16px 14px;display:flex;flex-direction:column;gap:12px;}
#msg{text-align:center;font-size:11px;font-weight:bold;min-height:16px;color:#e85d30;}
.lbl{font-size:9px;color:#6677bb;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;}
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:12px 14px;font-size:16px;color:#fff;font-family:monospace;outline:none;-webkit-appearance:none;display:block;}
.inp:focus{border-color:#f5c842;}
.inp::placeholder{color:#2a3a6a;}
/* Personaggi — bottoni normali senza trucchi */
#chars{display:flex;gap:8px;}
.ch{
  flex:1;
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.12);
  border-radius:10px;
  padding:10px 4px;
  text-align:center;
  font-family:monospace;
  cursor:pointer;
  display:block;
  width:100%;
}
.ch.sel{border-color:#f5c842;background:rgba(245,200,66,.12);}
.ch-icon{font-size:22px;display:block;margin-bottom:4px;}
.ch-name{font-size:10px;color:#f5c842;font-weight:bold;display:block;}
.ch-cls{font-size:8px;color:#556688;display:block;margin-top:2px;}
/* Entra */
#btn{width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:bold;font-family:monospace;letter-spacing:2px;cursor:pointer;background:rgba(245,200,66,.12);color:#f5c842;border:2px solid rgba(245,200,66,.35);display:block;}
#btn:disabled{opacity:.35;cursor:default;}
#foot{text-align:center;font-size:8px;color:#1a2a50;letter-spacing:1px;}
/* Dialog */
#ov{display:none;position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:24px;}
#ov.show{display:flex;}
#dlg{width:100%;max-width:300px;background:#071330;border:2px solid rgba(245,200,66,.4);border-radius:14px;padding:22px 18px;display:flex;flex-direction:column;gap:14px;}
#dlg-icon{font-size:36px;text-align:center;}
#dlg-title{font-size:12px;font-weight:bold;color:#f5c842;text-align:center;letter-spacing:1px;}
#dlg-body{font-size:11px;color:#8899cc;text-align:center;line-height:1.6;}
#dlg-name{color:#f5c842;font-weight:bold;}
#dlg-btns{display:flex;gap:8px;}
.dlg-btn{flex:1;padding:13px;border-radius:9px;font-size:12px;font-weight:bold;font-family:monospace;cursor:pointer;display:block;}
#btn-no{background:rgba(231,76,60,.12);color:#e74c3c;border:1px solid rgba(231,76,60,.35);}
#btn-si{background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid rgba(46,204,113,.35);}
/* Welcome */
#wel{display:none;position:fixed;inset:0;z-index:50;background:#071330;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px;}
#wel.show{display:flex;}
#wel-icon{font-size:60px;}
#wel-name{font-size:20px;font-weight:bold;color:#f5c842;letter-spacing:2px;}
#wel-role{font-size:11px;color:#556699;letter-spacing:2px;}
#wel-xp{font-size:11px;color:#4a8a4a;}
#wel-msg{font-size:11px;color:#7788aa;line-height:1.6;max-width:260px;}
#btn-start{padding:13px 28px;border-radius:10px;background:rgba(245,200,66,.12);color:#f5c842;border:2px solid rgba(245,200,66,.35);font-size:13px;font-weight:bold;font-family:monospace;letter-spacing:2px;cursor:pointer;}
</style>
</head>

function chk() {
  var l = document.getElementById('inp-locale').value.trim();
  var n = document.getElementById('inp-nome').value.trim();
  var p = document.getElementById('inp-pin').value.trim();
  document.getElementById('btn').disabled = !(l.length>=2 && n.length>=2 && p.length===4 && role);
}

function setMsg(t,c) {
  var e=document.getElementById('msg');
  e.textContent=t;
  e.style.color=c||'#e85d30';
}

async function doLogin() {
  var locale = document.getElementById('inp-locale').value.trim().toUpperCase();
  var nome   = document.getElementById('inp-nome').value.trim();
  var pin    = document.getElementById('inp-pin').value.trim();
  var btn    = document.getElementById('btn');
  btn.disabled=true;
  setMsg('Connessione...');
  try {
    var f = encodeURIComponent('AND({Nome}="'+nome+'",{Locale}="'+locale+'")');
    var r = await fetch(AT_URL+'?filterByFormula='+f, {headers:AT_H});
    if(!r.ok) throw new Error('Errore API '+r.status);
    var d = await r.json();
    if(d.records && d.records.length>0) {
      var rec=d.records[0], fl=rec.fields;
      if(String(fl['PIN']||'')!==pin) {
        setMsg('PIN errato. Riprova.','#e74c3c');
        document.getElementById('inp-pin').value='';
        btn.disabled=false; return;
      }
      fetch(AT_URL+'/'+rec.id, {method:'PATCH',headers:AT_H,
        body:JSON.stringify({fields:{'Ultima Sessione':new Date().toISOString()}})});
      user={id:rec.id,nome:fl['Nome']||nome,ruolo:fl['Ruolo']||role,
        classe:cls,emoji:emoji,locale:fl['Locale']||locale,
        xp:fl['XP Totale']||0,nuovo:false};
      setMsg('Accesso riuscito!','#2ecc71');
      setTimeout(showWel,500);
    } else {
      if(!role){setMsg('Scegli il personaggio.','#e74c3c');btn.disabled=false;return;}
      pN=nome; pL=locale;
      document.getElementById('dlg-name').textContent='"'+nome+'"';
      document.getElementById('ov').classList.add('show');
      setMsg('Profilo non trovato.','#e74c3c');
      btn.disabled=false;
    }
  } catch(e) { setMsg('Errore: '+e.message,'#e74c3c'); btn.disabled=false; }
}

function doNo() {
  document.getElementById('ov').classList.remove('show');
  document.getElementById('inp-locale').value='';
  document.getElementById('inp-nome').value='';
  document.getElementById('inp-pin').value='';
  document.querySelectorAll('.ch').forEach(function(b){b.classList.remove('sel');});
  role=null; cls=null; emoji=null;
  document.getElementById('btn').disabled=true;
  setMsg('Inserisci i tuoi dati');
}

async function doSi() {
  document.getElementById('ov').classList.remove('show');
  var pin = document.getElementById('inp-pin').value.trim();
  var btn = document.getElementById('btn');
  btn.disabled=true; setMsg('Creo il profilo...');
  try {
    var cr = await fetch(AT_URL, {method:'POST',headers:AT_H,
      body:JSON.stringify({fields:{
        'Nome':pN,'PIN':pin,'Ruolo':role,'Locale':pL,
        'Data Creazione':new Date().toISOString(),
        'XP Totale':0,'Ultima Sessione':new Date().toISOString()
      }})});
    if(!cr.ok){var eb=await cr.json();throw new Error(cr.status+' '+JSON.stringify(eb));}
    var c=await cr.json();
    user={id:c.id,nome:pN,ruolo:role,classe:cls,emoji:emoji,locale:pL,xp:0,nuovo:true};
    setMsg('Profilo creato!','#2ecc71');
    setTimeout(showWel,500);
  } catch(e) { setMsg('Errore: '+e.message,'#e74c3c'); btn.disabled=false; }
}

function showWel() {
  document.getElementById('wel-icon').textContent = user.emoji||'';
  document.getElementById('wel-name').textContent = (user.nuovo?'Benvenuto, ':'Bentornato, ')+user.nome+'!';
  document.getElementById('wel-role').textContent = user.ruolo.toUpperCase()+' · '+(user.classe||'').toUpperCase();
  document.getElementById('wel-xp').textContent   = user.nuovo?'Livello 1 · 0 XP':'XP: '+user.xp;
  document.getElementById('wel-msg').textContent  = user.nuovo
    ? 'Il tuo profilo e pronto. Completa la mappa per diventare un maestro.'
    : 'Il tuo dungeon ti aspetta. Continua da dove ti eri fermato.';
  document.getElementById('wel').classList.add('show');
}

function goGame() {
  sessionStorage.setItem('sq_user', JSON.stringify(user));
  alert('Login OK!\n\n'+user.nome+' - '+user.ruolo+'\nXP: '+user.xp+'\n\nProssimo step: la mappa!');
}
</script>
