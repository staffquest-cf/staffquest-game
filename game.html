<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>StaffQuest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#071330;font-family:monospace;overflow:hidden;display:flex;flex-direction:column;}
#header{background:rgba(5,13,36,.98);border-bottom:1px solid rgba(245,200,66,.2);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
#logo{height:28px;}
#hud-right{text-align:right;}
#hud-name{font-size:10px;font-weight:bold;color:#f5c842;}
#hud-role{font-size:8px;color:#6677bb;}
#hud-xp{font-size:8px;color:#5a9a5a;}
#map-wrap{flex:1;position:relative;overflow:hidden;background:repeating-linear-gradient(0deg,rgba(255,255,255,.01) 0,rgba(255,255,255,.01) 1px,transparent 1px,transparent 32px),repeating-linear-gradient(90deg,rgba(255,255,255,.01) 0,rgba(255,255,255,.01) 1px,transparent 1px,transparent 32px),#07070f;}
#map-svg{position:absolute;top:0;left:0;width:100%;height:100%;}
#map-nodes{position:absolute;top:0;left:0;width:100%;height:100%;}
.map-node{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;touch-action:manipulation;z-index:5;}
.room-img{border-radius:5px;border:2px solid rgba(255,255,255,.15);image-rendering:pixelated;transition:all .15s;display:block;}
.map-node.done .room-img{border-color:rgba(46,204,113,.7);}
.map-node.active .room-img{border-color:#f5c842;animation:pulse 2s ease-in-out infinite;}
.map-node:active .room-img{transform:scale(.93);}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(245,200,66,.3);}50%{box-shadow:0 0 18px rgba(245,200,66,.7);}}
.node-label{background:rgba(5,13,36,.92);border:1px solid rgba(245,200,66,.25);border-radius:5px;padding:3px 7px;font-size:8px;color:#f5c842;text-align:center;white-space:pre-line;line-height:1.3;pointer-events:none;}
.map-node.done .node-label{color:#2ecc71;border-color:rgba(46,204,113,.3);}
.node-check{position:absolute;top:-5px;right:-5px;background:#2ecc71;border-radius:50%;width:16px;height:16px;font-size:9px;display:none;align-items:center;justify-content:center;color:#fff;font-weight:bold;z-index:6;}
.map-node.done .node-check{display:flex;}
.tdeco{position:absolute;font-size:14px;animation:flicker 1.4s ease-in-out infinite alternate;z-index:4;pointer-events:none;}
@keyframes flicker{0%{opacity:.5;transform:scale(1);}100%{opacity:1;transform:scale(1.1);}}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(5,13,36,.95);border-top:1px solid rgba(245,200,66,.15);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
#bar-info{font-size:9px;color:#6677bb;}
#bar-count{font-size:9px;color:#f5c842;}
/* NODE OVERLAY */
#node-ov{display:none;position:fixed;inset:0;z-index:50;background:#071330;flex-direction:column;}
#node-ov.show{display:flex;}
#nh{background:rgba(5,13,36,.98);border-bottom:1px solid rgba(245,200,66,.2);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.btn-back{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;font-size:11px;color:#8899cc;cursor:pointer;font-family:monospace;touch-action:manipulation;}
#nt{font-size:12px;font-weight:bold;color:#f5c842;flex:1;}
#nb{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
#n-header{display:flex;align-items:center;gap:12px;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(245,200,66,.2);border-radius:10px;margin-bottom:4px;}
#n-img{width:56px;height:56px;border-radius:6px;image-rendering:pixelated;border:2px solid rgba(245,200,66,.3);}
.n-title{font-size:12px;font-weight:bold;color:#f5c842;}
.n-sub{font-size:9px;color:#6677bb;margin-top:3px;}
.proc-row{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;touch-action:manipulation;font-family:monospace;}
.proc-row:active{background:rgba(245,200,66,.08);border-color:#f5c842;}
.proc-row.done{border-color:rgba(46,204,113,.4);background:rgba(46,204,113,.06);}
.pr-info{flex:1;}
.pr-title{font-size:12px;font-weight:bold;color:#f5c842;}
.pr-sub{font-size:9px;color:#6677bb;margin-top:2px;}
.pr-badge{font-size:8px;padding:2px 7px;border-radius:99px;font-weight:bold;}
.lb{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);}
.li{background:rgba(245,200,66,.15);color:#f5c842;border:1px solid rgba(245,200,66,.3);}
.la{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3);}
.lok{background:rgba(46,204,113,.2);color:#2ecc71;}
/* QUIZ */
#quiz-sc{display:none;position:fixed;inset:0;z-index:55;background:#071330;flex-direction:column;}
#quiz-sc.show{display:flex;}
#qh{background:rgba(5,13,36,.98);border-bottom:1px solid rgba(245,200,66,.2);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#qt{font-size:11px;font-weight:bold;color:#f5c842;flex:1;}
#qprog{font-size:10px;color:#6677bb;flex-shrink:0;}
#qbody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
#q-sc{background:rgba(255,255,255,.04);border:1px solid rgba(245,200,66,.2);border-radius:10px;padding:12px;font-size:11px;color:#aabbdd;line-height:1.6;}
#q-dom{font-size:13px;font-weight:bold;color:#f5c842;line-height:1.4;}
#q-ops{display:flex;flex-direction:column;gap:7px;}
.qop{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;font-size:12px;color:#ccd;cursor:pointer;touch-action:manipulation;font-family:monospace;text-align:left;line-height:1.4;}
.qop.correct{background:rgba(46,204,113,.15);border-color:#2ecc71;color:#2ecc71;}
.qop.wrong{background:rgba(231,76,60,.12);border-color:#e74c3c;color:#e74c3c;}
.qop.reveal{background:rgba(46,204,113,.08);border-color:rgba(46,204,113,.4);color:#2ecc71;}
#q-fb{background:rgba(5,13,36,.9);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;font-size:11px;color:#8899cc;line-height:1.6;display:none;}
#q-fb.show{display:block;}
#q-fbt{font-size:12px;font-weight:bold;margin-bottom:5px;}
#q-fbt.ok{color:#2ecc71;}
#q-fbt.ko{color:#e74c3c;}
#btn-next{width:100%;padding:13px;border-radius:10px;font-size:13px;font-weight:bold;font-family:monospace;letter-spacing:1px;cursor:pointer;background:rgba(245,200,66,.12);color:#f5c842;border:1px solid rgba(245,200,66,.35);display:none;touch-action:manipulation;}
#btn-next.show{display:block;}
/* RISULTATO */
#res-sc{display:none;position:fixed;inset:0;z-index:65;background:#071330;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px;}
#res-sc.show{display:flex;}
#res-icon{font-size:56px;}
#res-title{font-size:22px;font-weight:bold;color:#f5c842;}
#res-xp{font-size:14px;color:#2ecc71;}
#res-msg{font-size:11px;color:#7788aa;line-height:1.6;max-width:280px;}
#btn-res{margin-top:6px;padding:13px 28px;border-radius:10px;background:rgba(245,200,66,.12);color:#f5c842;border:1px solid rgba(245,200,66,.35);font-size:13px;font-weight:bold;font-family:monospace;letter-spacing:2px;cursor:pointer;touch-action:manipulation;}
</style>
</head>

“Lo metto in lista senza dirgli niente”, “Lo ignoro”], “risposta_corretta”: “Mi scuso, do una stima dell’attesa e chiedo se vuole aspettare”}, {“domanda”: “Una prenotazione cancella all’ultimo minuto. Cosa fai?”, “opzioni”: [“Non faccio niente”, “Avviso subito la cucina e segno nel registro”, “Aspetto che arrivi un altro cliente”, “Segno solo nel registro”], “risposta_corretta”: “Avviso subito la cucina e segno nel registro”}, {“domanda”: “Un cliente telefona per prenotare e ha un’allergia. Cosa noti?”, “opzioni”: [“Solo nome e numero di persone”, “Nome, numero persone e allergia da comunicare alla cucina”, “Solo l’allergia”, “Non prendo nota”], “risposta_corretta”: “Nome, numero persone e allergia da comunicare alla cucina”}, {“domanda”: “Un cliente arriva 30 minuti in ritardo sulla prenotazione. Cosa fai?”, “opzioni”: [“Do il suo tavolo a un altro”, “Mantengo il tavolo se disponibile e lo accolgo normalmente”, “Lo faccio aspettare come punizione”, “Chiamo il responsabile senza far niente”], “risposta_corretta”: “Mantengo il tavolo se disponibile e lo accolgo normalmente”}]}], “Gestione Reclami”: [{“id”: “d4”, “titolo”: “Gestione reclamo cliente”, “livello”: “Avanzato”, “percorso”: “Gestione Reclami”, “scenario”: “Un cliente urla che ha trovato un capello nel piatto davanti a tutti.”, “quiz”: [{“domanda”: “Come reagisci immediatamente?”, “opzioni”: [“Dico che non è possibile”, “Mi scuso sinceramente, ritiro il piatto e avviso il responsabile”, “Offro uno sconto e vado via”, “Accuso la cucina”], “risposta_corretta”: “Mi scuso sinceramente, ritiro il piatto e avviso il responsabile”}, {“domanda”: “Il cliente vuole i soldi indietro. Puoi decidere da solo?”, “opzioni”: [“Sì, offro subito il rimborso”, “No, chiamo il responsabile che ha l’autorità di decidere”, “Dico di no e vado via”, “Ignoro la richiesta”], “risposta_corretta”: “No, chiamo il responsabile che ha l’autorità di decidere”}, {“domanda”: “Dopo aver risolto, cosa fai?”, “opzioni”: [“Non faccio niente, è fin lisco finché non arriva”], “risposta_corretta”: “Segnalo al responsabile e utilizzo il prodotto sostitutivo approvato”}, {“domanda”: “Un collega non ha pulito la sua area. Cosa fai?”, “opzioni”: [“Non faccio niente, non è colpa mia”, “Lo segnalo al responsabile con calma”, “Pulisco io senza dire niente”, “Litigo con il collega”], “risposta_corretta”: “Lo segnalo al responsabile con calma”}]}]};

var user=null,completati={};
var curNode=null,curNodeProcs=[],curNodePerc=’’,curNodeImgSrc=’’,curNodeSz=72;
var curProc=null,curQuiz=[],curQ=0,curScore=0,answered=false;

window.onload=function(){
var raw=sessionStorage.getItem(‘sq_user’);
if(!raw){window.location.href=‘index.html’;return;}
user=JSON.parse(raw);
document.getElementById(‘hud-name’).textContent=user.nome;
document.getElementById(‘hud-role’).textContent=(user.ruolo||’’).toUpperCase()+’ · ‘+(user.classe||’’).toUpperCase();
document.getElementById(‘hud-xp’).textContent=’XP: ’+(user.xp||0);
var pr=sessionStorage.getItem(‘sq_progressi’);
if(pr) completati=JSON.parse(pr);
renderMap();
};

function renderMap(){
var wrap=document.getElementById(‘map-wrap’);
var W=wrap.offsetWidth, H=wrap.offsetHeight;
var svg=document.getElementById(‘map-svg’);
var nd=document.getElementById(‘map-nodes’);
nd.innerHTML=’’; svg.innerHTML=’’;

var ruolo=user.ruolo||‘Cameriere’;
if(ruolo===‘Sala’) ruolo=‘Cameriere’;
if(ruolo===‘Cucina’) ruolo=‘Cuoco’;
var nodes=MAP_NODES[ruolo]||MAP_NODES[‘Cameriere’];
var pm=PERC_MAP[ruolo]||PERC_MAP[‘Cameriere’];

var pos={};
nodes.forEach(function(n){pos[n.id]={x:W*n.x/100,y:H*n.y/100};});

// Corridoi SVG
var sc=’’;
nodes.forEach(function(n){
n.connections.forEach(function(cid){
var p1=pos[n.id],p2=pos[cid];
if(!p2)return;
sc+=’<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#080f20" stroke-width="32" stroke-linecap="round"/>’;
sc+=’<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#141e3a" stroke-width="26" stroke-linecap="round"/>’;
sc+=’<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#808aa3" stroke-width="16" stroke-linecap="round" opacity="0.28"/>’;
sc+=’<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#c0c8e0" stroke-width="4" stroke-linecap="round" opacity="0.07"/>’;
});
});
svg.innerHTML=sc;

var total=0,done=0;
nodes.forEach(function(n){
var p=pos[n.id];
var imgSrc=document.getElementById(SIZES[n.size]||‘img-medium’).src;
var nodePerc=Object.keys(pm).find(function(k){return pm[k]===n.id;})||’’;
var nProcs=DEMO[nodePerc]||[];
var nDone=nProcs.length>0&&nProcs.every(function(pr){return completati[pr.id];});
var hasP=nProcs.length>0;
if(hasP){total++;}
if(nDone){done++;}
var sz=n.size===‘large’?92:n.size===‘medium’?68:52;
var div=document.createElement(‘div’);
div.className=‘map-node’+(nDone?’ done’:(hasP?’ active’:’’));
div.style.left=p.x+‘px’; div.style.top=p.y+‘px’;
var img=document.createElement(‘img’);
img.className=‘room-img’; img.src=imgSrc;
img.style.width=sz+‘px’; img.style.height=sz+‘px’;
var chk=document.createElement(‘div’);
chk.className=‘node-check’; chk.innerHTML=’✓’;
var lbl=document.createElement(‘div’);
lbl.className=‘node-label’;
lbl.style.maxWidth=(sz+20)+‘px’;
lbl.textContent=n.label;
if(n.size===‘large’&&!nDone&&hasP){
var t=document.createElement(‘span’);
t.style.cssText=‘position:absolute;font-size:11px;top:-3px;right:-3px;’;
t.innerHTML=’🔥’;
div.appendChild(t);
}
div.appendChild(img); div.appendChild(chk); div.appendChild(lbl);
if(hasP){
div.onclick=(function(node2,procs2,perc2,isrc,sz2){
return function(){openNode(node2,procs2,perc2,isrc,sz2);};
})(n,nProcs,nodePerc,imgSrc,sz);
}
nd.appendChild(div);
});
document.getElementById(‘bar-count’).textContent=done+’/’+total+’ completate’;
}

function openNode(node,procs,perc,imgSrc,sz){
curNode=node; curNodeProcs=procs; curNodePerc=perc; curNodeImgSrc=imgSrc; curNodeSz=sz;
document.getElementById(‘nt’).textContent=perc;
var ni=document.getElementById(‘n-img’);
ni.src=imgSrc; ni.style.width=sz+‘px’; ni.style.height=sz+‘px’;
document.getElementById(‘n-t’).textContent=perc;
document.getElementById(‘n-s’).textContent=procs.length+’ procedura’+(procs.length>1?‘e’:’’) +’ disponibil’+(procs.length>1?‘i’:‘e’);
var pd=document.getElementById(‘n-procs’); pd.innerHTML=’’;
procs.forEach(function(proc){
var lv=proc.livello||‘Base’,isDone=completati[proc.id]?true:false;
var row=document.createElement(‘div’);
row.className=‘proc-row’+(isDone?’ done’:’’);
var lc=isDone?‘lok’:lv===‘Base’?‘lb’:lv===‘Intermedio’?‘li’:‘la’;
row.innerHTML=’<div class="pr-info"><div class="pr-title">’+proc.titolo+’</div><div class="pr-sub">’+lv+(isDone?’ · Completato’:’’)+’</div></div><span class="pr-badge '+lc+'">’+(isDone?’✓’:lv)+’</span>’;
row.onclick=(function(pr){return function(){startQuiz(pr);};}) (proc);
pd.appendChild(row);
});
document.getElementById(‘node-ov’).classList.add(‘show’);
}

function closeNode(){document.getElementById(‘node-ov’).classList.remove(‘show’);}

function startQuiz(proc){
curProc=proc; curQuiz=proc.quiz; curQ=0; curScore=0; answered=false;
document.getElementById(‘qt’).textContent=proc.titolo;
document.getElementById(‘node-ov’).classList.remove(‘show’);
document.getElementById(‘quiz-sc’).classList.add(‘show’);
showQ();
}

function showQ(){
answered=false;
var q=curQuiz[curQ];
document.getElementById(‘qprog’).textContent=(curQ+1)+’/’+curQuiz.length;
document.getElementById(‘q-dom’).textContent=q.domanda;
document.getElementById(‘q-fb’).classList.remove(‘show’);
document.getElementById(‘btn-next’).classList.remove(‘show’);
var scEl=document.getElementById(‘q-sc’);
scEl.textContent=curProc.scenario||’’;
scEl.style.display=curProc.scenario?‘block’:‘none’;
var od=document.getElementById(‘q-ops’); od.innerHTML=’’;
q.opzioni.forEach(function(op){
var btn=document.createElement(‘button’);
btn.className=‘qop’; btn.type=‘button’; btn.textContent=op;
btn.onclick=function(){if(!answered)checkQ(op,q.risposta_corretta);};
od.appendChild(btn);
});
document.getElementById(‘qbody’).scrollTop=0;
}

function checkQ(chosen,correct){
if(answered)return; answered=true;
var isOk=chosen.trim()===correct.trim();
if(isOk)curScore++;
document.querySelectorAll(’.qop’).forEach(function(btn){
btn.disabled=true;
if(btn.textContent.trim()===correct.trim()) btn.classList.add(isOk?‘correct’:‘reveal’);
else if(btn.textContent.trim()===chosen.trim()&&!isOk) btn.classList.add(‘wrong’);
});
var fbt=document.getElementById(‘q-fbt’);
fbt.innerHTML=isOk?’✓ Corretto!’:’✗ Sbagliato’;
fbt.className=isOk?‘ok’:‘ko’;
document.getElementById(‘q-fbb’).textContent=’Risposta corretta: ’+correct;
document.getElementById(‘q-fb’).classList.add(‘show’);
var bn=document.getElementById(‘btn-next’);
bn.innerHTML=curQ<curQuiz.length-1?‘Prossima ▶’:‘Vedi risultato 🏆’;
bn.classList.add(‘show’);
}

function nextQ(){curQ++;if(curQ<curQuiz.length)showQ();else showResult();}

function showResult(){
var total=curQuiz.length,perc=Math.round((curScore/total)*100),xp=curScore*10,passed=perc>=70;
user.xp=(user.xp||0)+xp;
document.getElementById(‘hud-xp’).textContent=‘XP: ‘+user.xp;
sessionStorage.setItem(‘sq_user’,JSON.stringify(user));
if(passed){
completati[curProc.id]={score:perc,xp:xp};
sessionStorage.setItem(‘sq_progressi’,JSON.stringify(completati));
saveXP();
}
document.getElementById(‘quiz-sc’).classList.remove(‘show’);
var icon=perc===100?’🏆’:perc>=70?’⭐’:’😅’;
document.getElementById(‘res-icon’).innerHTML=icon;
document.getElementById(‘res-title’).textContent=perc>=70?‘Superato!’:‘Riprova!’;
document.getElementById(‘res-xp’).textContent=curScore+’/’+total+’ corrette · +’+xp+’ XP’;
document.getElementById(‘res-msg’).textContent=perc>=70
?‘Hai risposto correttamente al ‘+perc+’%. Torna al dungeon per la prossima stanza!’
:‘Ti serve il 70% per superare. Ce la puoi fare!’;
document.getElementById(‘res-sc’).classList.add(‘show’);
}

async function saveXP(){
try{
await fetch(AT_URL_U+’/’+user.id,{method:‘PATCH’,headers:AT_H,
body:JSON.stringify({fields:{‘XP Totale’:user.xp,‘Ultima Sessione’:new Date().toISOString().slice(0,10)}})
});
}catch(e){console.log(‘XP save:’,e);}
}

function closeQuiz(){
document.getElementById(‘quiz-sc’).classList.remove(‘show’);
openNode(curNode,curNodeProcs,curNodePerc,curNodeImgSrc,curNodeSz);
}

function backToMap(){
document.getElementById(‘res-sc’).classList.remove(‘show’);
document.getElementById(‘node-ov’).classList.remove(‘show’);
renderMap();
}
</script>
