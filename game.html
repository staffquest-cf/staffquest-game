<!DOCTYPE html>
<html lang="it">

<title>StaffQuest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#07070f;font-family:monospace}
body{display:flex;flex-direction:column;align-items:center}
#root{position:relative;width:100%;max-width:390px;height:100%;display:flex;flex-direction:column}
#ga{position:relative;flex:1;min-height:0;overflow:hidden;background:#07070f}
#ga canvas{display:block!important;image-rendering:pixelated;image-rendering:crisp-edges}

#hud{
  position:absolute;top:0;left:0;right:0;padding:6px 10px;pointer-events:none;z-index:20;
  display:flex;justify-content:space-between;align-items:flex-start;gap:6px
}
.hb{background:rgba(5,13,36,.94);border:1px solid rgba(245,200,66,.3);border-radius:8px;padding:5px 9px}
.hn{font-size:10px;font-weight:bold;color:#f5c842}
.hx{font-size:8px;color:#5a9a5a;margin-top:2px}
.xbar{background:#1a1a0a;border-radius:3px;height:4px;width:84px;margin-top:3px;overflow:hidden}
.xfill{height:100%;background:#f5c842;border-radius:3px;transition:width .35s}
.hw{font-size:8px;color:#8888aa;text-align:right;line-height:1.7}

#toast{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.92);color:#ccc;font-size:9px;padding:6px 14px;border-radius:20px;
  border:1px solid #2a2a3a;pointer-events:none;opacity:0;transition:opacity .3s;
  white-space:nowrap;z-index:15;max-width:90%;text-align:center
}

/* Dialog */
#sage-ov{
  position:absolute;inset:0;z-index:40;display:none;flex-direction:column;justify-content:flex-end
}
#sage-ov.show{display:flex}
#sage-bg{position:absolute;inset:0;background:rgba(0,0,0,.55)}
#sage-box{position:relative;background:#07070f;border-top:3px solid #f5c842}
#sage-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px 8px;border-bottom:1px solid rgba(245,200,66,.2)}
#sage-face{
  width:48px;height:48px;border-radius:8px;border:2px solid rgba(245,200,66,.4);
  overflow:hidden;flex-shrink:0;background:#0d0d22;display:flex;align-items:center;justify-content:center
}
#sage-face canvas{display:block;image-rendering:pixelated}
#sage-nametag{font-size:11px;font-weight:bold;color:#f5c842}
#sage-proc{font-size:9px;color:#6677bb;margin-top:2px}
#sage-body{padding:10px 14px}
#sage-sc{font-size:10px;color:#8899bb;line-height:1.5;margin-bottom:8px;font-style:italic;min-height:30px}
#sage-q{font-size:12px;font-weight:bold;color:#f5c842;line-height:1.4;margin-bottom:10px}
#sage-ch{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.sage-btn{
  background:#0c0c24;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:9px 12px;
  font-size:10px;color:#aabbd0;text-align:left;cursor:pointer;font-family:monospace;line-height:1.4;
  touch-action:manipulation;display:block;width:100%
}
.sage-btn:active{background:rgba(245,200,66,.1);border-color:#f5c842;color:#f5c842}
.sage-btn[disabled]{cursor:default}
#sage-prog{font-size:9px;color:#445577;text-align:center}

/* Controls */
#ctl{
  position:absolute;bottom:6px;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 10px;z-index:12;pointer-events:none
}
#joy{width:88px;height:88px;pointer-events:auto;position:relative;touch-action:none}
#jb{
  position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.04);
  border:1.5px solid rgba(255,255,255,.12)
}
#jk{
  position:absolute;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.14);
  border:1.5px solid rgba(255,255,255,.26);top:50%;left:50%;transform:translate(-50%,-50%)
}
#bok{
  width:54px;height:54px;border-radius:50%;background:rgba(245,200,66,.1);border:2px solid #f5c842;
  pointer-events:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;touch-action:none;transition:opacity .15s, transform .15s
}
#bok:active{transform:scale(.96)}
#bok .ol{font-size:9px;font-weight:bold;color:#f5c842}
#bok .oh{
  font-size:7px;color:#555577;margin-top:1px;text-align:center;max-width:48px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis
}

/* Badge */
#badge{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:rgba(4,4,18,.97);border:2px solid #f5c842;border-radius:14px;padding:18px 24px;
  z-index:50;text-align:center;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none
}
#badge.show{transform:translate(-50%,-50%) scale(1)}
#badge .bi{font-size:36px;display:block;margin-bottom:6px}
#badge .bt{font-size:12px;font-weight:bold;color:#f5c842}
#badge .bs{font-size:9px;color:#aaa;margin-top:3px}

/* Result */
#result{
  position:absolute;inset:0;z-index:45;background:rgba(4,4,18,.97);display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:28px
}
#result.show{display:flex}
#res-icon{font-size:52px}
#res-title{font-size:20px;font-weight:bold;color:#f5c842}
#res-xp{font-size:13px;color:#2ecc71}
#res-msg{font-size:11px;color:#7788aa;line-height:1.6;max-width:270px}
#btn-res{
  margin-top:6px;padding:12px 26px;border-radius:10px;background:rgba(245,200,66,.12);
  color:#f5c842;border:1px solid rgba(245,200,66,.35);font-size:13px;font-weight:bold;
  font-family:monospace;letter-spacing:2px;cursor:pointer;touch-action:manipulation

</style>

/* =========================
   STORAGE + STATE
========================= */
function safeParse(raw, fallback) {
  try {
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}

function loadStoredUser() {
  const stored = safeParse(localStorage.getItem(STORAGE_KEYS.user), null) ||
                 safeParse(sessionStorage.getItem(STORAGE_KEYS.user), null);

  let nome = stored?.nome || "Eroe";
  let ruolo = stored?.ruolo || "Cameriere";
  let xp = Number(stored?.xp || 0);

  if (ruolo === "Sala") ruolo = "Cameriere";
  if (ruolo === "Cucina") ruolo = "Cuoco";
  if (!ALL_MAPS[ruolo]) ruolo = "Cameriere";

  return { nome, ruolo, xp };
}

function loadProgress() {
  return safeParse(localStorage.getItem(STORAGE_KEYS.progress), {
    completed: {},
    badges: {}
  });
}

    currentQuiz: [],
    currentQuestionIndex: 0,
    currentScore: 0,
    answered: false
  },
  gameScene: null
};

function persistUser() {
  localStorage.setItem(STORAGE_KEYS.user, JSON.stringify({
    nome: state.user.nome,
    ruolo: state.user.ruolo,
    xp: state.user.xp
  }));
}

function persistProgress() {
  localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify(state.progress));
}

function setCompleted(nodeId, value = true) {
  state.progress.completed[nodeId] = value;
  persistProgress();
}

function isCompleted(nodeId) {
  return !!state.progress.completed[nodeId];
}

function setBadge(key) {
  state.progress.badges[key] = true;
  persistProgress();
}

function hasBadge(key) {
  return !!state.progress.badges[key];
}

function qs(id) {

}

function updateHUD() {

function showBadge(icon, title, subtitle) {

function checkBadgeUnlocks() {

  }
  if (state.user.xp >= 500 && !hasBadge('bdg3')) {
    setBadge('bdg3');
    setTimeout(() => showBadge('🥇', 'Badge Oro', 'Maestro del dungeon'), 400);

}

function closeResult() {

/* =========================
   DIALOG / QUIZ
========================= */
function openSage(nodeId) {
  const quest = ALL_QUESTS[nodeId];
  if (!quest) {
    toast('Quest non trovata');
    return;
  }

  state.ui.sageOpen = true;
  state.ui.currentNodeId = nodeId;
  state.ui.currentQuiz = quest.quiz;
  state.ui.currentQuestionIndex = 0;
  state.ui.currentScore = 0;
  state.ui.answered = false;

  qs('sage-nametag').textContent = `Il Saggio — ${quest.titolo}`;
  qs('sage-proc').textContent = quest.titolo;
  qs('sage-sc').style.color = '#8899bb';
  qs('sage-sc').textContent = quest.scenario || '';
  qs('sage-ov').classList.add('show');

  renderSageQuestion();
}

function renderSageQuestion() {
  state.ui.answered = false;
  const q = state.ui.currentQuiz[state.ui.currentQuestionIndex];
  if (!q) return;

  qs('sage-q').textContent = q.d;
  qs('sage-prog').textContent = `Domanda ${state.ui.currentQuestionIndex + 1} di ${state.ui.currentQuiz.length}`;
  qs('sage-sc').style.color = '#8899bb';

  const container = qs('sage-ch');
  container.innerHTML = '';

  q.o.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'sage-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => answerSage(opt, q.r, q.fb));
    container.appendChild(btn);
  });
}

function answerSage(chosen, correct, feedback) {
  if (state.ui.answered) return;
  state.ui.answered = true;

  const isCorrect = chosen.trim() === correct.trim();
  if (isCorrect) state.ui.currentScore++;

  document.querySelectorAll('.sage-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent.trim() === correct.trim()) {
      btn.style.background = 'rgba(46,204,113,.15)';
      btn.style.borderColor = '#2ecc71';
      btn.style.color = '#2ecc71';
    } else if (btn.textContent.trim() === chosen.trim() && !isCorrect) {
      btn.style.background = 'rgba(231,76,60,.12)';
      btn.style.borderColor = '#e74c3c';
      btn.style.color = '#e74c3c';
    }
  });

  qs('sage-sc').style.color = isCorrect ? '#2ecc71' : '#e74c3c';
  qs('sage-sc').textContent = (isCorrect ? '✓ Corretto. ' : '✗ Risposta errata. ') + feedback;

  setTimeout(() => {
    if (state.ui.currentQuestionIndex < state.ui.currentQuiz.length - 1) {
      state.ui.currentQuestionIndex++;
      renderSageQuestion();
    } else {
      finishSageQuiz();
    }
  }, 1500);
}

function finishSageQuiz() {
  qs('sage-ov').classList.remove('show');
  state.ui.sageOpen = false;

  const total = state.ui.currentQuiz.length;
  const correct = state.ui.currentScore;
  const percentage = Math.round((correct / total) * 100);
  const passed = percentage >= 60;
  const xpGain = passed ? correct * 15 : 0;

  if (passed) {
    state.user.xp += xpGain;
    setCompleted(state.ui.currentNodeId, true);
    persistUser();
    updateHUD();
    checkBadgeUnlocks();

    if (state.gameScene) {
      state.gameScene.refreshNodes();
    }
  }

  const icon = percentage === 100 ? '🏆' : passed ? '⭐' : '😅';
  qs('res-icon').textContent = icon;
  qs('res-title').textContent = passed ? 'Superato!' : 'Riprova!';
  qs('res-xp').textContent = `${correct}/${total} corrette${passed ? ` · +${xpGain} XP` : ''}`;
  qs('res-msg').textContent = passed
    ? `Hai risposto correttamente al ${percentage}%. Continua l’avventura.`
    : 'Per superare la stanza ti serve almeno il 60%.';
  qs('result').classList.add('show');
}

qs('sage-bg').addEventListener('click', () => {

});

const sageFace = {
  timer: null,
  frame: 0,
  drawFallback() {
    const c = qs('sage-canvas');
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 48, 48);

    ctx.fillStyle = '#0f1730';
    ctx.fillRect(0, 0, 48, 48);

    ctx.fillStyle = '#d4a520';
    ctx.fillRect(18, 6, 12, 6);

    ctx.fillStyle = '#f0c89a';
    ctx.fillRect(14, 12, 20, 18);

    ctx.fillStyle = '#3e2a1d';
    ctx.fillRect(14, 10, 20, 6);

    ctx.fillStyle = '#111';
    ctx.fillRect(19, 19, 2, 2);
    ctx.fillRect(27, 19, 2, 2);

    const mouthY = this.frame % 2 === 0 ? 25 : 24;
    ctx.fillRect(21, mouthY, 6, 2);

    this.frame++;
  },
  start() {
    this.stop();
    this.drawFallback();
    this.timer = setInterval(() => this.drawFallback(), 200);
  },
  stop() {
    if (this.timer) clearInterval(this.timer);
    this.timer = null;
  }
};

sageFace.start();
window.addEventListener('beforeunload', () => sageFace.stop());

/* =========================
   VALIDATION
========================= */
function validateData() {
  const nodeIds = new Set();

  Object.values(ALL_MAPS).forEach(roleNodes => {
    roleNodes.forEach(node => {
      nodeIds.add(node.id);
      if (!ALL_QUESTS[node.id]) {
        console.warn('Nodo senza quiz:', node.id);
      }
      node.conn.forEach(target => {
        if (!roleNodes.some(n => n.id === target)) {
          console.warn(`Connessione non valida da ${node.id} a ${target}`);
        }
      });
    });
  });

  Object.entries(ALL_QUESTS).forEach(([id, quest]) => {
    if (!nodeIds.has(id)) {
      console.warn('Quiz senza nodo:', id);
    }
    if (!quest.quiz || !Array.isArray(quest.quiz) || quest.quiz.length === 0) {
      console.warn('Quiz vuoto:', id);
    }
  });
}
validateData();

/* =========================
   PHASER SCENE
========================= */
class DungeonScene extends Phaser.Scene {
  constructor() {
    super('Dungeon');
    this.jActive = false;
    this.jv = { x: 0, y: 0 };
    this.near = null;
    this.nodePixels = {};
    this.nodeGfx = {};
    this.doorInteract = [];
    this.torches = [];
    this.playerUsesFallback = false;
    this._handlers = [];
    this.walkFrame = 0;
    this.idleFrame = 0;
    this.animTimer = 0;
    this.torchTimer = 0;
    this.torchPulse = 0;
  }

  preload() {
    const W = GW * TW;
    const H = GH * TW;

    const prog = this.add.graphics();
    const bg = this.add.rectangle(W / 2, H / 2, W, H, 0x07070f);
    const txt = this.add.text(W / 2, H / 2 - 16, 'Carico il dungeon...', {
      fontSize: '9px',
      color: '#f5c842',
      fontFamily: 'monospace'
    }).setOrigin(0.5);

    const drawProgress = (v) => {
      prog.clear();
      prog.fillStyle(0x1a1a2e);
      prog.fillRect(W / 2 - 80, H / 2 + 8, 160, 12);
      prog.fillStyle(0xf5c842);
      prog.fillRect(W / 2 - 80, H / 2 + 8, 160 * v, 12);
    };

    this.load.on('progress', drawProgress);
    this.load.on('complete', () => {
      prog.destroy();
      bg.destroy();
      txt.destroy();
      this.load.off('progress', drawProgress);
    });

    // asset opzionali
    this.load.spritesheet('wf', 'assets/walls_floor.png', { frameWidth: TW, frameHeight: TW });
    this.load.spritesheet('fire', 'assets/fire_animation2.png', { frameWidth: TW, frameHeight: TW });

    for (let i = 0; i < 30; i++) {
      const num = String(i).padStart(3, '0');
      this.load.image('walk_' + i, 'assets/warrior_walk/0_Warrior_Walk_' + num + '.png');
    }
    for (let i = 0; i < 8; i++) {
      const num = String(i).padStart(3, '0');
      this.load.image('idle_' + i, 'assets/warrior_idle/0_Warrior_Idle_' + num + '.png');
    }
  }

  create() {
    state.gameScene = this;
    this.nodes = ALL_MAPS[state.user.ruolo] || ALL_MAPS.Cameriere;

    this.createFallbackPlayerTexture();
    this.buildFloor();
    this.buildNodes();
    this.spawnPlayer();
    this.setupInput();
    this.setupJoystick();
    this.setupInteractButton();

    this.cameras.main.startFollow(this.pp, true, 0.08, 0.08);
    this.cameras.main.setZoom(SCALE);
    this.cameras.main.setBounds(0, 0, GW * TW, GH * TW);

    updateHUD();
    setTimeout(() => {
      toast('Avvicinati a una porta e premi OK per iniziare il quiz');
    }, 700);

    this.events.once(Phaser.Scenes.Events.SHUTDOWN, () => {
      this.cleanupHandlers();
    });

    this.events.once(Phaser.Scenes.Events.DESTROY, () => {
      this.cleanupHandlers();
    });
  }

  createFallbackPlayerTexture() {
    if (this.textures.exists('player_fallback')) return;
    const g = this.make.graphics({ x: 0, y: 0, add: false });

    g.fillStyle(0x1b2143);
    g.fillRect(4, 2, 8, 3);

    g.fillStyle(0xf0c89a);
    g.fillRect(4, 5, 8, 6);

    g.fillStyle(0x2c5aa0);
    g.fillRect(3, 11, 10, 5);

    g.fillStyle(0x111111);
    g.fillRect(4, 17, 3, 3);
    g.fillRect(9, 17, 3, 3);

    g.generateTexture('player_fallback', 16, 20);
    g.destroy();
  }

  hasPlayerAssets() {
    return this.textures.exists('idle_0');
  }

  hasFloorAssets() {
    return this.textures.exists('wf');
  }

  hasFireAssets() {
    return this.textures.exists('fire');
  }

  buildFloor() {
    const FLOOR_FRAMES = [42, 55, 56, 57, 58, 59];
    const WALL_FRAMES = [0, 1, 2, 3, 13, 14, 15, 91, 104];

    const rng = ((seed) => {
      let x = seed >>> 0;
      return () => {
        x = (x * 1664525 + 1013904223) >>> 0;
        return x;
      };
    })(99);

    for (let row = 0; row < GH; row++) {
      for (let col = 0; col < GW; col++) {
        const cell = CMAP[row][col];
        const x = col * TW + TW / 2;
        const y = row * TW + TW / 2;

        if (this.hasFloorAssets()) {
          const frame = cell === 2
            ? WALL_FRAMES[rng() % WALL_FRAMES.length]
            : FLOOR_FRAMES[rng() % FLOOR_FRAMES.length];

          this.add.image(x, y, 'wf', frame).setDepth(0);
        } else {
          const g = this.add.graphics().setDepth(0);

          if (cell === 2) {
            g.fillStyle(0x171726);
            g.fillRect(x - 8, y - 8, 16, 16);
            g.fillStyle(0x22223a);
            g.fillRect(x - 8, y - 8, 16, 3);
            g.fillStyle(0x2a2a45);
            g.fillRect(x - 7, y - 5, 14, 12);
          } else {
            g.fillStyle(0x151b2e);
            g.fillRect(x - 8, y - 8, 16, 16);
            g.fillStyle(0x182139);
            g.fillRect(x - 8, y - 8, 16, 16);
            g.fillStyle(0x1d2947);
            g.fillRect(x - 7, y - 7, 14, 14);
          }
        }
      }
    }

    [[2,2],[12,2],[2,21],[12,21]].forEach(([c, r]) => {
      const g = this.add.graphics().setDepth(2);
      const x = c * TW + TW / 2;
      const y = r * TW + TW / 2;
      g.fillStyle(0x6b3311);
      g.fillRect(x - 5, y - 8, 10, 16);
      g.fillStyle(0xc8921a);
      g.fillRect(x - 5, y - 4, 10, 2);
      g.fillRect(x - 5, y + 2, 10, 2);
    });
  }

  buildNodes() {
    const W = GW * TW;
    const H = GH * TW;
    this.nodePixels = {};
    this.nodeGfx = {};
    this.doorInteract = [];
    this.torches = [];

    this.nodes.forEach(n => {
      this.nodePixels[n.id] = {
        x: W * n.x / 100,
        y: H * n.y / 100
      };
    });

    const cg = this.add.graphics().setDepth(1);
    this.nodes.forEach(n => {
      const p1 = this.nodePixels[n.id];
      n.conn.forEach(cid => {
        const p2 = this.nodePixels[cid];
        if (!p2) return;

        cg.lineStyle(14, 0x1a2a4a, 1);
        cg.lineBetween(p1.x, p1.y, p2.x, p2.y);
        cg.lineStyle(10, 0x808aa3, 0.28);
        cg.lineBetween(p1.x, p1.y, p2.x, p2.y);
        cg.lineStyle(3, 0xc0c8e0, 0.1);
        cg.lineBetween(p1.x, p1.y, p2.x, p2.y);

        const mx = (p1.x + p2.x) / 2;
        const my = (p1.y + p2.y) / 2;
        cg.fillStyle(0xf5c842, 0.2);
        cg.fillCircle(mx, my, 2);
      });
    });

    this.nodes.forEach(n => {
      const p = this.nodePixels[n.id];
      const done = isCompleted(n.id);
      const sz = n.sz === 2 ? 18 : 13;

      const doorGraphics = this.add.graphics().setDepth(3);
      this.drawDoor(doorGraphics, p.x, p.y, sz, done);

      const labelText = this.add.text(p.x, p.y - sz - 8, n.label, {
        fontSize: '5px',
        color: done ? '#2ecc71' : '#f5c842',
        fontFamily: 'monospace',
        align: 'center',
        backgroundColor: 'rgba(5,13,36,0.88)',
        padding: { x: 3, y: 2 }
      }).setOrigin(0.5, 1).setDepth(4);

      this.nodeGfx[n.id] = {
        g: doorGraphics,
        x: p.x,
        y: p.y,
        sz,
        isDone: done,
        labelText
      };

      if (n.sz === 2 && !done) {
        if (this.hasFireAssets()) {
          const t = this.add.image(p.x + sz + 5, p.y, 'fire', 0).setDepth(4).setScale(0.85);
          this.torches.push({ type: 'sprite', ref: t });
        } else {
          const glow = this.add.graphics().setDepth(4);
          this.torches.push({ type: 'gfx', ref: glow, x: p.x + sz + 5, y: p.y });
        }
      }

      this.doorInteract.push({
        x: p.x,
        y: p.y,
        id: n.id,
        lbl: n.label.replace(/\n/g, ' '),
        sz
      });
    });
  }

  drawDoor(g, x, y, sz, done) {
    g.clear();
    const doorColor = done ? 0x1a5c30 : 0x7a3311;
    const accentColor = done ? 0x2ecc71 : 0xD4A520;

    g.fillStyle(0x1a1a2e);
    g.fillRect(x - sz - 3, y - sz * 1.4 - 3, sz * 2 + 6, sz * 2.8 + 6);

    g.fillStyle(0x2a3a5a);
    g.fillRect(x - sz - 1, y - sz * 1.4 - 1, sz * 2 + 2, sz * 2.8 + 2);

    g.fillStyle(doorColor);
    g.fillRect(x - sz, y - sz * 1.4, sz * 2, sz * 2.8);

    g.fillStyle(0x000000, 0.2);
    g.fillRect(x - sz + 2, y - sz * 1.4 + 2, sz * 2 - 4, sz * 1.3);
    g.fillRect(x - sz + 2, y - sz * 1.4 + sz * 1.4 + 1, sz * 2 - 4, sz * 1.2);

    g.fillStyle(accentColor);
    g.fillCircle(x + sz - 4, y, 2.5);

    g.fillStyle(0x3a4a6a);
    g.fillRect(x - sz - 1, y - sz * 1.4 - 5, sz * 2 + 2, 5);

    if (!done) {
      g.fillStyle(0xf5c842, 0.06);
      g.fillCircle(x, y, sz * 2.2);
    }

    if (done) {
      g.fillStyle(0x2ecc71, 0.85);
      g.fillCircle(x, y - sz + 4, 4);
      g.fillStyle(0xffffff, 0.9);
      g.fillRect(x - 1, y - sz + 2, 1.5, 3.5);
      g.fillRect(x + 0.5, y - sz + 4, 2.5, -2);
    }
  }

  refreshNodes() {
    this.nodes.forEach(n => {
      const info = this.nodeGfx[n.id];
      if (!info) return;

      const done = isCompleted(n.id);
      if (done && !info.isDone) {
        info.isDone = true;
        this.drawDoor(info.g, info.x, info.y, info.sz, true);
        info.labelText.setColor('#2ecc71');
      }
    });
  }

  spawnPlayer() {
    const first = this.nodePixels[this.nodes[0].id];
    const sx = first ? first.x : GW * TW / 2;
    const sy = first ? first.y + TW * 3 : GH * TW / 2;

    const textureKey = this.hasPlayerAssets() ? 'idle_0' : 'player_fallback';
    this.playerUsesFallback = !this.hasPlayerAssets();

    this.pp = this.physics.add.sprite(sx, sy, textureKey)
      .setCollideWorldBounds(true)
      .setMaxVelocity(90, 90)
      .setDepth(10);

    if (this.playerUsesFallback) {
      this.pp.setDisplaySize(18, 22);
    } else {
      this.pp.setDisplaySize(18, 22);
    }

    this.ptag = this.add.text(sx, sy, state.user.nome, {
      fontSize: '5px',
      color: '#f5c842',
      fontFamily: 'monospace',
      backgroundColor: '#00000099',
      padding: { x: 2, y: 1 }
    }).setOrigin(0.5, 1).setDepth(11);
  }

  setupInput() {
    this.curs = this.input.keyboard.createCursorKeys();
    this.wk = this.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.W,
      dn: Phaser.Input.Keyboard.KeyCodes.S,
      lt: Phaser.Input.Keyboard.KeyCodes.A,
      rt: Phaser.Input.Keyboard.KeyCodes.D
    });
    this.spc = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.enter = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
  }

  setupJoystick() {
    const joy = qs('joy');
    const knob = qs('jk');
    if (!joy || !knob) return;

    const R = 26;

    const getPoint = (e) => {
      const t = e.touches ? e.touches[0] : e;
      const rect = joy.getBoundingClientRect();
      return {
        x: t.clientX - rect.left - rect.width / 2,
        y: t.clientY - rect.top - rect.height / 2
      };
    };

    const onStart = (e) => {
      if (state.ui.sageOpen) return;
      e.preventDefault?.();
      this.jActive = true;
    };

    const onMove = (e) => {
      if (!this.jActive || state.ui.sageOpen) return;
      e.preventDefault?.();

      const p = getPoint(e);
      const dist = Math.min(Math.hypot(p.x, p.y), R);
      const ang = Math.atan2(p.y, p.x);
      const cx = Math.cos(ang) * dist;
      const cy = Math.sin(ang) * dist;

      knob.style.transform = `translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px))`;
      this.jv = { x: cx / R, y: cy / R };
    };

    const onEnd = () => {
      this.jActive = false;
      this.jv = { x: 0, y: 0 };
      knob.style.transform = 'translate(-50%,-50%)';
    };

    joy.addEventListener('touchstart', onStart, { passive: false });
    joy.addEventListener('touchmove', onMove, { passive: false });
    joy.addEventListener('touchend', onEnd, { passive: false });
    joy.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);

    this._handlers.push(() => joy.removeEventListener('touchstart', onStart));
    this._handlers.push(() => joy.removeEventListener('touchmove', onMove));
    this._handlers.push(() => joy.removeEventListener('touchend', onEnd));
    this._handlers.push(() => joy.removeEventListener('mousedown', onStart));
    this._handlers.push(() => window.removeEventListener('mousemove', onMove));
    this._handlers.push(() => window.removeEventListener('mouseup', onEnd));
  }

  setupInteractButton() {
    const btn = qs('bok');
    if (!btn) return;

    const onTouch = (e) => {
      e.preventDefault();
      this.interact();
    };

    const onMouse = () => {
      this.interact();
    };

    btn.addEventListener('touchstart', onTouch, { passive: false });
    btn.addEventListener('mousedown', onMouse);

    this._handlers.push(() => btn.removeEventListener('touchstart', onTouch));
    this._handlers.push(() => btn.removeEventListener('mousedown', onMouse));
  }

  cleanupHandlers() {
    while (this._handlers.length) {
      const fn = this._handlers.pop();
      try { fn(); } catch {}
    }
  }

  isWall(col, row) {
    if (row < 0 || row >= GH || col < 0 || col >= GW) return true;
    return CMAP[row][col] === 2;
  }

  canMoveTo(nextX, nextY) {
    const halfW = 5;
    const halfH = 6;

    const pts = [
      { x: nextX - halfW, y: nextY - halfH },
      { x: nextX + halfW, y: nextY - halfH },
      { x: nextX - halfW, y: nextY + halfH },
      { x: nextX + halfW, y: nextY + halfH }
    ];

    return pts.every(p => {
      const c = Math.floor(p.x / TW);
      const r = Math.floor(p.y / TW);
      return !this.isWall(c, r);
    });
  }

  getMovementVector() {
    let x = 0;
    let y = 0;

    if (this.curs.left.isDown || this.wk.lt.isDown) x -= 1;
    if (this.curs.right.isDown || this.wk.rt.isDown) x += 1;
    if (this.curs.up.isDown || this.wk.up.isDown) y -= 1;
    if (this.curs.down.isDown || this.wk.dn.isDown) y += 1;

    if (this.jActive && (Math.abs(this.jv.x) > 0.08 || Math.abs(this.jv.y) > 0.08)) {
      x = this.jv.x;
      y = this.jv.y;
    }

    const len = Math.hypot(x, y);
    if (len > 0) {
      x /= len;
      y /= len;
    }

    return { x, y };
  }

  interact() {
    if (state.ui.sageOpen || !this.near) return;

    if (isCompleted(this.near.id)) {
      toast('Stanza già completata');
      return;
    }

    openSage(this.near.id);
  }

  updateTorches(delta) {
    this.torchTimer += delta;
    this.torchPulse += delta * 0.01;

    if (this.hasFireAssets()) {
      if (this.torchTimer > 120) {
        this.torchTimer = 0;
        this.torches.forEach(t => {
          if (t.type === 'sprite') {
            const cur = t.ref.frame.name || 0;
            t.ref.setFrame((Number(cur) + 1) % 6);
          }
        });
      }
    } else {
      this.torches.forEach(t => {
        if (t.type !== 'gfx') return;
        const g = t.ref;
        const flick = 4 + Math.sin(this.torchPulse + t.x * 0.07) * 1.2;
        g.clear();
        g.fillStyle(0xf5c842, 0.18);
        g.fillCircle(t.x, t.y, flick + 4);
        g.fillStyle(0xffa500, 0.7);
        g.fillCircle(t.x, t.y, flick);
        g.fillStyle(0xfff2b2, 0.9);
        g.fillCircle(t.x, t.y - 1, Math.max(1.5, flick * 0.45));
      });
    }
  }

  updatePlayerAnimation(vx, vy, delta) {
    const moving = vx !== 0 || vy !== 0;

    if (this.playerUsesFallback) {
      this.pp.setFlipX(vx < 0);
      this.pp.setScale(moving ? 1.02 : 1);
      return;
    }

    this.animTimer += delta;

    if (moving) {
      if (this.animTimer > 70) {
        this.animTimer = 0;
        this.walkFrame = (this.walkFrame + 1) % 30;
        const key = 'walk_' + this.walkFrame;
        if (this.textures.exists(key)) {
          this.pp.setTexture(key);
        }
      }
      this.pp.setFlipX(vx < 0);
    } else {
      if (this.animTimer > 150) {
        this.animTimer = 0;
        this.idleFrame = (this.idleFrame + 1) % 8;
        const key = 'idle_' + this.idleFrame;
        if (this.textures.exists(key)) {
          this.pp.setTexture(key);
        }
      }
      this.pp.setFlipX(false);
    }
  }

  updateNearbyDoor() {
    let near = null;
    let nearestDist = Infinity;

    this.doorInteract.forEach(obj => {
      const d = Phaser.Math.Distance.Between(this.pp.x, this.pp.y, obj.x, obj.y);
      if (d < (obj.sz * 2 + 10) && d < nearestDist) {
        nearestDist = d;
        near = obj;
      }
    });

    this.near = near;

    const okBtn = qs('bok');
    const okHint = qs('oh');
    if (okBtn) okBtn.style.opacity = near ? '1' : '0.35';
    if (okHint) okHint.textContent = near ? near.lbl.split(' ')[0] : 'esplora';
  }

  update(time, delta) {
    this.updateTorches(delta);

    if (state.ui.sageOpen) {
      this.pp.setVelocity(0, 0);
      return;
    }

    const speed = 62;
    const input = this.getMovementVector();
    let vx = input.x * speed;
    let vy = input.y * speed;

    const dt = delta / 1000;
    const nextX = this.pp.x + vx * dt;
    const nextY = this.pp.y + vy * dt;

    if (!this.canMoveTo(nextX, this.pp.y)) vx = 0;
    if (!this.canMoveTo(this.pp.x, nextY)) vy = 0;

    this.pp.setVelocity(vx, vy);
    this.updatePlayerAnimation(vx, vy, delta);

    this.ptag.x = this.pp.x;
    this.ptag.y = this.pp.y - 14;

    this.updateNearbyDoor();

    if (Phaser.Input.Keyboard.JustDown(this.spc) || Phaser.Input.Keyboard.JustDown(this.enter)) {
      this.interact();
    }
  }
}

/* =========================
   INIT
========================= */
updateHUD();

new Phaser.Game({
  type: Phaser.AUTO,
  parent: 'ga',
  backgroundColor: '#07070f',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 0 },
      debug: false
    }
  },
  scene: [DungeonScene],
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: GW * TW,
    height: GH * TW,
    parent: 'ga'
  }
});
</script>
